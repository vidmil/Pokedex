<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokéDex</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>

<body class="theme-red" id="body-app">

    <header class="pokedex-header" id="main-header">
        <div class="header-content">
            <img src="midias/logo_pokedex.png" alt="Logo PokéDex" class="logo-main">
            <img src="midias/pokebola_1.png" alt="Pokebola" class="pokebola-img" id="img-pokebola">
    </header>

    <section class="container mt-4">
        <div class="search-container d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm">
            <div class="pokedex-status d-flex align-items-center">
                <img src="midias/ico_pokedex.png" alt="Ícone Pokedex" width="40">
                <span class="ms-2 fw-bold" id="total-count">...</span>
            </div>
            <div class="search-box">
                <label class="form-label d-block mb-0 small fw-bold">Digite o nome do pokemon</label>
                <div class="input-group">
                    <input type="text" id="textBusca" class="form-control border-0 bg-light" placeholder="Informe o nome">
                </div>
            </div>
        </div>
    </section>

    <main class="container mt-4">
        <div class="row g-4" id="lista-pokemon">
            </div>
       
        <div class="text-center my-5">
            <button class="btn-load-more" id="btn-carregar">Carregar mais...</button>
        </div>
    </main>

    <footer class="footer-pokedex" id="main-footer">
        <p class="mb-0">Desenvolvido por <strong>Davi</strong></p>
        <small>App desenvolvido com o uso de API do PokéDex</small>
    </footer>

    <script src="js/script.js"></script>
</body>
</html>
